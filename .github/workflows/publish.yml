name: Publish

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "packages/varnish/src/**"
      - "packages/twist/src/**"
      - "deno.json"
      - "packages/*/deno.json"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - all
          - snarl
          - varnish
          - imouto
        default: "all"

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish-snarl:
    needs: ci
    if: |
      github.event_name == 'push' ||
      github.event.inputs.package == 'all' ||
      github.event.inputs.package == 'snarl'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Publish @july/snarl
        run: deno publish

  publish-varnish:
    needs: ci
    if: |
      github.event_name == 'push' ||
      github.event.inputs.package == 'all' ||
      github.event.inputs.package == 'varnish'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Publish @404/varnish
        working-directory: packages/varnish
        run: deno publish

  publish-imouto:
    needs: ci
    if: |
      github.event_name == 'push' ||
      github.event.inputs.package == 'all' ||
      github.event.inputs.package == 'imouto'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Publish @404/imouto
        working-directory: packages/imouto
        run: deno publish
